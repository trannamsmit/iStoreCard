name: Build Android APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Lấy mã nguồn ────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ───────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      # ── 3. Setup Java JDK 17 (bắt buộc cho Android Gradle) ────────
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # ── 4. Cache Gradle để build nhanh hơn các lần sau ────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('client/android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Cài thư viện NPM ────────────────────────────────────────
      - name: Install NPM dependencies
        working-directory: client
        run: npm ci

      # ── 6. Build Vite (tạo thư mục dist/) ────────────────────────
      - name: Build web (Vite)
        working-directory: client
        run: npm run build

      # ── 7. Xóa thư mục android cũ (React Native skeleton) ────────
      #       rồi để Capacitor tạo lại đúng chuẩn
      - name: Remove old android folder
        working-directory: client
        run: rm -rf android

      # ── 8. Khởi tạo Capacitor Android project ────────────────────
      - name: Capacitor add android
        working-directory: client
        run: npx cap add android

      # ── 9. Sync web assets vào Android project ────────────────────
      - name: Capacitor sync
        working-directory: client
        run: npx cap sync android

      # ── 10. Tạo local.properties cho Android SDK ──────────────────
      - name: Create local.properties
        working-directory: client/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # ── 11. Build APK Debug ────────────────────────────────────────
      - name: Build APK (Debug)
        working-directory: client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ── 12. Upload APK artifact ────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iStoreCard-v${{ github.run_number }}
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 13. Tạo GitHub Release tự động khi push lên main ─────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "iStoreCard v1.0.${{ github.run_number }}"
          body: |
            ## iStoreCard Android APK
            
            **Build:** #${{ github.run_number }}
            **Ngày build:** ${{ github.event.head_commit.timestamp }}
            
            ### Cách cài đặt:
            1. Tải file `iStoreCard.apk` bên dưới
            2. Chép vào điện thoại Android
            3. Bật "Cho phép cài từ nguồn không xác định" trong Cài đặt
            4. Mở file và cài đặt
            5. Nhập IP Server LAN khi khởi động lần đầu
          files: client/android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
