name: Build Android APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Lấy mã nguồn ────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ───────────────────────────────────────────
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      # ── 3. Setup Java JDK 17 (bắt buộc cho Android Gradle) ────────
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # ── 4. Cache Gradle để build nhanh hơn các lần sau ────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('client/android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Cài thư viện NPM ────────────────────────────────────────
      - name: Install NPM dependencies
        working-directory: client
        run: npm ci

      # ── 6. Build Vite (tạo thư mục dist/) ────────────────────────
      - name: Build web (Vite)
        working-directory: client
        run: npm run build

      # ── 7. Xóa thư mục android cũ (React Native skeleton) ────────
      #       rồi để Capacitor tạo lại đúng chuẩn
      - name: Remove old android folder
        working-directory: client
        run: rm -rf android

      # ── 8. Khởi tạo Capacitor Android project ────────────────────
      - name: Capacitor add android
        working-directory: client
        run: npx cap add android

      # ── 9. Generate icon từ resources/icon.png ────────────────────
      - name: Generate app icon
        working-directory: client
        run: |
          npm install @capacitor/assets --save-dev
          npx capacitor-assets generate --android

      # ── 10. Sync web assets vào Android project ───────────────────
      - name: Capacitor sync
        working-directory: client
        run: npx cap sync android

      # ── 11. Cho phép HTTP cleartext trong mạng LAN (Android 9+) ───
      - name: Patch network security config for HTTP LAN
        working-directory: client/android
        run: |
          RES_DIR="app/src/main/res/xml"
          mkdir -p "$RES_DIR"
          cat > "$RES_DIR/network_security_config.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system" />
              </trust-anchors>
            </base-config>
          </network-security-config>
          EOF
          # Thêm networkSecurityConfig vào AndroidManifest.xml nếu chưa có
          MANIFEST="app/src/main/AndroidManifest.xml"
          if ! grep -q "networkSecurityConfig" "$MANIFEST"; then
            sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' "$MANIFEST"
          fi
          echo "✅ Network security config patched"

      # ── 12. Tạo local.properties cho Android SDK ──────────────────
      - name: Create local.properties
        working-directory: client/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # ── 13. Build APK Debug ────────────────────────────────────────
      - name: Build APK (Debug)
        working-directory: client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ── 14. Upload APK artifact ────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iStoreCard-v${{ github.run_number }}
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 15. Hiển thị thông tin APK đã build ──────────────────────
      - name: APK build summary
        run: |
          echo "✅ APK build thành công!"
          ls -lh client/android/app/build/outputs/apk/debug/
